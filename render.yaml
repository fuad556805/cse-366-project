services:
  - type: web
    name: nl2sql-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # Render dashboard e manually Neon URL set korte hobe
      - key: SESSION_SECRET
        generateValue: true
